<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Фавикон повторяет логотип из шапки: ледяной шар со звездой.
    Градиент и цвета взяты с лендинга (.logo .mark) один в один:
    radial-gradient(circle at 32% 28%, #fff, #8fe0ff 55%, #4fc4f5), звезда #04121f.
  -->
  <defs>
    <radialGradient id="ice" cx="32%" cy="28%" r="78%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#8fe0ff"/>
      <stop offset="1" stop-color="#4fc4f5"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="16" fill="url(#ice)"/>
  <!-- ✦ — четырёхлучевая звезда, как в логотипе -->
  <path d="M16 6.4 L18.05 13.95 L25.6 16 L18.05 18.05 L16 25.6 L13.95 18.05 L6.4 16 L13.95 13.95 Z"
        fill="#04121f"/>
</svg>
